<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strategy — AInvest</title>

  <link rel="stylesheet" href="vendor/fonts/fonts.css">
  <script src="vendor/tailwindcss-browser/index.global.js"></script>

  <style>
    html, body, #root { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.005em;
    }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    /* Scrollbar — softer, less industrial. */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(15, 23, 42, 0.08); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(15, 23, 42, 0.18); background-clip: padding-box; }
    .aimeclaw-scrollbar::-webkit-scrollbar { width: 6px; }
    .aimeclaw-scrollbar::-webkit-scrollbar-thumb { background: rgba(15,23,42,0.10); }

    /* Dark-theme scrollbar overrides — applied when root carries .theme-dark. */
    .theme-dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.10); }
    .theme-dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.20); }
    .theme-dark .aimeclaw-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.12); }
    /* Tell the browser to use dark form-control chrome (otherwise <select>/<input>
       render with native light fills that paint over Tailwind backgrounds). */
    .theme-dark { color-scheme: dark; }

    /* App canvas — cool slate base so chrome accents and P&L colors stay legible. */
    .app-canvas {
      background:
        radial-gradient(1400px 600px at 50% -10%, rgba(14, 165, 233, 0.045), transparent 60%),
        radial-gradient(1100px 500px at 100% 0%, rgba(100, 116, 139, 0.030), transparent 60%),
        #f5f7fb;
    }

    /* Soft hero wash for the Strategy header. */
    .studio-hero {
      background:
        radial-gradient(800px 240px at 0% 0%, rgba(14, 165, 233, 0.050), transparent 55%),
        radial-gradient(700px 220px at 100% 0%, rgba(124, 58, 237, 0.035), transparent 55%),
        #ffffff;
    }
    .theme-dark .studio-hero {
      background:
        radial-gradient(800px 240px at 0% 0%, rgba(14, 165, 233, 0.12), transparent 55%),
        radial-gradient(700px 220px at 100% 0%, rgba(124, 58, 237, 0.08), transparent 55%),
        #0d1014;
    }

    /* Soft elevation for the major content cards on the canvas. */
    .elev-card {
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.04),
        0 10px 28px -18px rgba(15, 23, 42, 0.14);
    }
    /* Lighter elevation for tile-level cards (strategy cards, list items). */
    .elev-tile {
      box-shadow:
        0 1px 2px rgba(15, 23, 42, 0.03),
        0 4px 14px -10px rgba(15, 23, 42, 0.10);
      transition: box-shadow 220ms ease, transform 220ms ease, border-color 220ms ease;
    }
    .elev-tile:hover {
      box-shadow:
        0 2px 4px rgba(15, 23, 42, 0.04),
        0 14px 30px -16px rgba(15, 23, 42, 0.18);
      transform: translateY(-1px);
    }
    /* A floating elevation for modals/popovers — only used for the welcome modal etc. */
    .elev-pop {
      box-shadow:
        0 4px 14px rgba(15, 23, 42, 0.06),
        0 30px 60px -20px rgba(15, 23, 42, 0.30);
    }

    /* Hairline under the topbar to detach it from canvas without a hard border. */
    .topbar-edge {
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04), 0 4px 16px -12px rgba(15, 23, 42, 0.08);
    }
    /* Soft left lift for the chat rail — separates it from the canvas. */
    .chat-rail {
      box-shadow: -10px 0 24px -18px rgba(15, 23, 42, 0.18);
    }

    /* Toast / fade-up reused across AimeClaw chat blocks. */
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes aimeclaw-fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes aimeclaw-pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes aimeclaw-draw {
      from { stroke-dasharray: 0 1200; }
      to   { stroke-dasharray: 1200 0; }
    }

    /* Subtle pulse for "running" status */
    @keyframes softPulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .animate-pulse { animation: softPulse 2s ease-in-out infinite; }
  </style>

</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <!-- React -->
  <script src="vendor/react/react.development.js"></script>
  <script src="vendor/react-dom/react-dom.development.js"></script>
  <script src="vendor/babel/babel.min.js"></script>

  <!-- Tweaks panel (provides useTweaks, TweaksPanel, controls) -->
  <script type="text/babel" src="js/tweaks-panel.jsx"></script>

  <!-- Data & primitives (vibetrading marketplace data) -->
  <script type="text/babel" src="js/data.jsx"></script>
  <script type="text/babel" src="js/quant-data.jsx"></script>
  <script type="text/babel" src="js/charts.jsx"></script>

  <!-- AimeClaw chat — data, store, primitives, blocks, panel -->
  <script type="text/babel" src="js/aimeclaw-data.jsx"></script>
  <script type="text/babel" src="js/aimeclaw-store.jsx"></script>
  <script type="text/babel" src="js/aimeclaw-common.jsx"></script>
  <script type="text/babel" src="js/aimeclaw-blocks.jsx"></script>
  <script type="text/babel" src="js/aimeclaw-panel.jsx"></script>

  <!-- Surfaces -->
  <script type="text/babel" src="js/topbar.jsx"></script>
  <script type="text/babel" src="js/marketplace.jsx"></script>
  <script type="text/babel" src="js/onwatch.jsx"></script>
  <script type="text/babel" src="js/activity.jsx"></script>
  <script type="text/babel" src="js/aicharts.jsx"></script>
  <script type="text/babel" src="js/modals.jsx"></script>
  <script type="text/babel" src="js/welcome-modal.jsx"></script>

  <!-- Studio (quant research workspace) -->
  <script type="text/babel" src="js/result-views.jsx"></script>
  <script type="text/babel" src="js/detail-page.jsx"></script>
  <script type="text/babel" src="js/builders.jsx"></script>
  <script type="text/babel" src="js/engine-picker-modal.jsx"></script>
  <script type="text/babel" src="js/studio.jsx"></script>

  <!-- App -->
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
